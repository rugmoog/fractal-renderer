<!DOCTYPE html>
<html>
  <head>
    <title>Hello, World!</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/mathjs@15.1.1/lib/browser/math.min.js"></script>
  </head>
  <body>
    <h1>Mandelbrot Renderer</h1>
    <a>
      by pugmoog. <a href="https://pugmoog.com" target="_blank">pugmoog.com</a>
    </a>
    <br /><br />
    <button onclick="zoomIn();">zoom in</button>
    <button onclick="zoomOut();">zoom out</button>
    <br /><br />
    <canvas id="display" width="100" height="100"></canvas>


    <br /><br />


    <a>Resolution: </a>
    <input id="resolution-input" type="number" value="100" step="1" />
    <br />
    <a>Depth: </a>
    <input id="depth-input" type="number" value="100" step="1" />

    <br /><br />

    <details>
      <summary><strong>Color Settings</strong></summary>
      <a>Color Change: </a>
      <input id="color-int-input" type="number" value="100" step="1" /><br>
      <a>Color Delay: </a>
      <input id="color-delay-input" type="number" value="0" step="1" /><br>
      <a>Color Fade: </a>
      <input id="color-fade-input" type="number" value="100" step="1" /><br>
    </details>

    <br />

    <details>
      <summary><strong>Other Settings</strong></summary>
      <a>Screen Size: </a>
      <input id="screen-size-input" type="number" value="100" step="1" /><br>
      <a>Max Overflow: </a>
      <input id="max-overflow-input" type="number" value="2" step="1" /><br>
      <a>Equation: </a><br>
      <textarea id="equation-input" rows="3" cols="35">zx_new: zx * zx - zy * zy + cx,
zy_new: 2 * zx * zy + cy</textarea><br>
      <a>At Start: </a><br>
      <textarea id="start-input" rows="3" cols="35">cx: pixelX,
cy: pixelY,
zx: 0,
zy: 0</textarea><br>
    </details>

    <br />
    <button onclick="updateSettings();">Update</button>

    <script src="render.js"></script>
    <script src="main.js"></script>
  </body>
</html>
